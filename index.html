<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .progress-stats { display: flex; gap: 1.5rem; margin-top: 0.5rem; font-size: 0.85rem; color: #64748b; }

  .question-text { font-size: 1.75rem; font-weight: 700; line-height: 1.6; color: #f1f5f9; margin-bottom: 2rem; }

  .options { display: flex; flex-direction: column; gap: 0.75rem; }
  .option-btn {
    width: 100%; text-align: left; padding: 1rem 1.25rem;
    border: 1px solid #475569; border-radius: 10px; background: transparent;

  }
  .option-btn:hover:not(:disabled) { border-color: #60a5fa; background: #1e3a5f; }
  .option-btn:disabled { cursor: default; opacity: 0.85; }
  .option-btn.selected-correct { border-color: #166534; background: #052e16; opacity: 1; }
  .option-btn.selected-wrong { border-color: #991b1b; background: #1a0a0a; opacity: 1; }
  .option-label { font-weight: 700; color: #60a5fa; margin-right: 0.5rem; }

  .feedback { margin-top: 1.5rem; padding: 1.25rem; border-radius: 10px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { border: 1px solid #166534; background: #052e16; }
  .feedback.wrong { border: 1px solid #991b1b; background: #1a0a0a; }
  .feedback-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.75rem; }
  .feedback-title.correct { color: #4ade80; }
  .feedback-title.wrong { color: #f87171; }
  .feedback-text { font-size: 1.05rem; line-height: 1.75; }
  .feedback-text.correct { color: #86efac; }
  .feedback-text.wrong { color: #fca5a5; }

  .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-prev:not(:disabled):hover { background: #475569; }
  .btn-next { display: none; background: #2563eb; color: #fff; }
  .btn-next.show { display: block; }
  .btn-next:hover { background: #1d4ed8; }

  .stat-label { font-size: 1.1rem; margin-top: 0.375rem; }
  .stat-label.green { color: #4ade80; }
  .stat-label.red { color: #f87171; }
  .stat-label.blue { color: #60a5fa; }

    padding: 1rem 1.25rem; border-radius: 10px; border: 1px solid #1e3a5f;
    background: #0b1a2e; margin-bottom: 1.25rem; color: #93c5fd; font-size: 1.15rem;

  .cumulative { padding: 1.25rem; border-radius: 10px; border: 1px solid #334155; color: #94a3b8; font-size: 1.05rem; margin-bottom: 1.25rem; }

    border: 1px solid #475569; border-radius: 10px; font-size: 1.15rem; cursor: pointer;

  .loading { text-align: center; padding: 3rem; color: #94a3b8; font-size: 1.2rem; }
  .error { text-align: center; padding: 3rem; color: #f87171; font-size: 1.2rem; }

  .page-subtitle { color: #94a3b8; font-size: 1.05rem; margin-bottom: 1.5rem; }

  .btn-icon { padding: 0.4rem 0.75rem; border: 1px solid #475569; border-radius: 8px; background: transparent; color: #94a3b8; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }

  .btn-icon.active { border-color: #60a5fa; color: #60a5fa; background: #1e3a5f; }

  .wrongbook-item { padding: 1rem; border: 1px solid #334155; border-radius: 10px; margin-bottom: 0.75rem; background: #1a2332; }

  .wrongbook-meta { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
  .wrongbook-meta .your { color: #f87171; }
  .wrongbook-meta .correct { color: #4ade80; }
  .wrongbook-empty { text-align: center; padding: 3rem; color: #64748b; font-size: 1.1rem; }

  .setting-group { margin-bottom: 1.5rem; }

  .btn-block { width: 100%; padding: 0.75rem; border: 1px solid #475569; border-radius: 10px; background: transparent; color: #e2e8f0; font-size: 1rem; cursor: pointer; text-align: center; margin-bottom: 0.5rem; transition: all 0.2s; }
  .btn-block:hover { background: #1e293b; }
  .btn-block.danger { border-color: #991b1b; color: #f87171; }
  .btn-block.danger:hover { background: #1a0a0a; }
  .btn-block.primary { border-color: #2563eb; color: #60a5fa; }

// ==================== 全局状态 ====================
var ALL_QUESTIONS = [];
var INTERVALS = [0, 1, 3, 7];
var currentBatch = [];
var currentIndex = 0;
var batchStats = { correct: 0, wrong: 0 };
var APP_DATA = null;
var answeredStates = [];
var todayCompletedFirstBatch = false;

// ==================== 日期工具 ====================
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function addDays(dateStr, n) {
  var d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

function daysDiff(a, b) {
  var da = new Date(a + 'T00:00:00');
  var db = new Date(b + 'T00:00:00');
  return Math.round((da - db) / 86400000);
}

// ==================== 数据持久化 ====================
function loadData() {
  try {
    var raw = localStorage.getItem('lit_quiz');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { day_index: 0, completed_days: {}, wrong_book: [], wrong_history: [], session: null };
}

function saveData(data) {
  try {
    localStorage.setItem('lit_quiz', JSON.stringify(data));
  } catch(e) {}
}

APP_DATA = loadData();

// ==================== 题库加载 ====================
function init() {
  for (var i = 0; i < EMBEDDED_QUESTIONS.length; i++) {
    ALL_QUESTIONS.push(EMBEDDED_QUESTIONS[i]);
  }

  currentView = 'quiz';
  APP_DATA = loadData();
  var today = todayStr();

  if (APP_DATA.session && APP_DATA.session.date === today) {
    resumeSession();
    return;
  }

  if (APP_DATA.completed_days[today]) {
    todayCompletedFirstBatch = true;
    showCompletionPage();
    return;
  }

  startNewBatch();
}

// ==================== 选题 ====================
function selectQuestions() {
  var today = todayStr();
  var selected = [];

  var overdue = APP_DATA.wrong_book
    .filter(function(w) { return w.next_review <= today; })
    .sort(function(a, b) { return daysDiff(b.next_review, today) - daysDiff(a.next_review, today); });

  var reviewIds = {};
  for (var i = 0; i < Math.min(overdue.length, 10); i++) {
    var w = overdue[i];
    var q = ALL_QUESTIONS.find(function(qq) { return qq.id === w.id; });
    if (q) {
      var copy = {};
      for (var k in q) copy[k] = q[k];
      copy._is_review = true;
      copy._wrong_entry = {};
      for (var k2 in w) copy._wrong_entry[k2] = w[k2];
      selected.push(copy);
      reviewIds[w.id] = true;
    }
  }

  var remaining = 30 - selected.length;
  var ptr = APP_DATA.day_index;
  while (remaining > 0 && ptr < ALL_QUESTIONS.length) {
    var q = ALL_QUESTIONS[ptr];
    if (!reviewIds[q.id]) {
      var copy = {};
      for (var k in q) copy[k] = q[k];
      copy._is_review = false;
      selected.push(copy);
      remaining--;
    }
    ptr++;
  }

  return selected;
}

function startNewBatch() {
  currentBatch = selectQuestions();
  currentIndex = 0;
  batchStats = { correct: 0, wrong: 0 };

  if (currentBatch.length === 0) {
    document.getElementById('app').innerHTML =
      renderTopBar(false) +
      '<div class="card" style="text-align:center;padding:3rem;"><p style="font-size:1.5rem;color:#94a3b8;">暂无可做题目</p><p class="hint-text" style="margin-top:0.5rem;">所有题目已完成，等待错题复习到期后再来。</p></div>';
    return;
  }

  renderQuestion();
}

// ==================== 渲染题目 ====================
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderQuestion() {
  var q = currentBatch[currentIndex];
  var isReview = q._is_review;
  var totalNew = currentBatch.filter(function(qq) { return !qq._is_review; }).length;
  var totalReview = currentBatch.length - totalNew;
  var donePercent = currentIndex / currentBatch.length * 100;
  var state = answeredStates[currentIndex];
  var feedbackHTML = state ? state.feedbackHTML : '';
  var navClass = state ? ' show' : '';
  var lastQ = currentIndex >= currentBatch.length - 1;
  var nextLabel = lastQ ? '完成 📋' : '下一题 →';
  var prevDisabled = currentIndex > 0 ? '' : ' disabled';

  var optsHTML = '';
  for (var i = 0; i < q.options.length; i++) {
    var letter = String.fromCharCode(65 + i);
    optsHTML += '<button class="option-btn" onclick="handleAnswer(\'' + letter + '\')" data-letter="' + letter + '"><span class="option-label">' + letter + '</span>' + escapeHtml(q.options[i].substring(3)) + '</button>';
  }

  document.getElementById('app').innerHTML =
    renderTopBar(false) +
    '<div class="progress-bar-wrap">' +
      '<div class="progress-info">' +
        '<span>第 ' + (currentIndex + 1) + ' / ' + currentBatch.length + ' 题</span>' +
        '<span style="color:' + (isReview ? '#f59e0b' : '#60a5fa') + '">' + (isReview ? '🔄 复习' : '📝 新题') + '</span>' +
      '</div>' +
      '<div class="progress-track">' +
        '<div class="progress-fill" style="width:' + donePercent.toFixed(1) + '%"></div>' +
      '</div>' +
      '<div class="progress-stats">' +
        '<span style="color:#4ade80">✅ ' + batchStats.correct + '</span> ' +
        '<span style="color:#f87171">❌ ' + batchStats.wrong + '</span> ' +
        '<span>📝 新题 ' + totalNew + ' · 🔄 复习 ' + totalReview + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="question-text">' + escapeHtml(q.question) + '</div>' +
      '<div class="options" id="options">' + optsHTML + '</div>' +
      '<div class="feedback' + (state ? ' show' : '') + '" id="feedback">' + feedbackHTML + '</div>' +
      '<div class="nav-buttons">' +
        '<button class="btn-prev" id="btn-prev" onclick="prevQuestion()"' + prevDisabled + '>← 上一题</button>' +
        '<button class="btn-next' + navClass + '" id="btn-next" onclick="nextQuestion()">' + nextLabel + '</button>' +
      '</div>' +
    '</div>';

  // 恢复已答题的选项状态
  if (state) {
    var btns = document.querySelectorAll('.option-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].disabled = true;
      var letter = btns[i].dataset.letter;
      if (letter === q.answer) btns[i].classList.add('selected-correct');
      if (letter === state.choice && !state.isCorrect) btns[i].classList.add('selected-wrong');
    }
  }
}

// ==================== 答案处理 ====================
function handleAnswer(choice) {
  var q = currentBatch[currentIndex];
  var isCorrect = choice === q.answer;

  var btns = document.querySelectorAll('.option-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    var letter = btns[i].dataset.letter;
    if (letter === q.answer) btns[i].classList.add('selected-correct');
    if (letter === choice && !isCorrect) btns[i].classList.add('selected-wrong');
  }

  if (isCorrect) batchStats.correct++;
  else batchStats.wrong++;

  var fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  var userOptText = q.options[choice.charCodeAt(0) - 65].substring(3);
  var correctOptText = q.options[q.answer.charCodeAt(0) - 65].substring(3);
  fb.innerHTML =
    '<div class="feedback-title ' + (isCorrect ? 'correct' : 'wrong') + '">' +
      (isCorrect ? '✅ 正确！' : '❌ 错误') +
      (!isCorrect ? '<span style="font-size:1rem;color:#94a3b8;margin-left:0.5rem;">你选了 ' + choice + '. ' + escapeHtml(userOptText) + '</span>' : '') +
    '</div>' +
    '<div class="feedback-text ' + (isCorrect ? 'correct' : 'wrong') + '">' +
      (!isCorrect ? '<strong style="font-size:1.1rem;">正确答案：' + q.answer + '. ' + escapeHtml(correctOptText) + '</strong><br><br>' : '') +
      escapeHtml(q.explanation || '') +
    '</div>';

  document.getElementById('btn-next').classList.add('show');

  answeredStates[currentIndex] = {
    choice: choice,
    isCorrect: isCorrect,
    feedbackHTML: fb.innerHTML
  };

  updateProgress(q, isCorrect);

  var statsEl = document.querySelector('.progress-stats');
  if (statsEl) {
    statsEl.innerHTML =
      '<span style="color:#4ade80">✅ ' + batchStats.correct + '</span> ' +
      '<span style="color:#f87171">❌ ' + batchStats.wrong + '</span> ' +
      '<span>📝 新题 ' + currentBatch.filter(function(qq) { return !qq._is_review; }).length + ' · 🔄 复习 ' + currentBatch.filter(function(qq) { return qq._is_review; }).length + '</span>';
  }
}

// ==================== 进度更新 ====================
function updateProgress(q, isCorrect) {
  var today = todayStr();

  if (isCorrect) {
    if (q._is_review && q._wrong_entry) {
      var entry = APP_DATA.wrong_book.find(function(w) { return w.id === q.id; });
      if (entry) {
        entry.stage += 1;
        if (entry.stage > 3) {
          APP_DATA.wrong_book = APP_DATA.wrong_book.filter(function(w) { return w.id !== q.id; });
        } else {
          entry.next_review = addDays(today, INTERVALS[entry.stage]);
        }
        entry.wrong_date = today;
      }
    }
  } else {
    var existing = APP_DATA.wrong_book.find(function(w) { return w.id === q.id; });
    if (existing) {
      existing.stage = 1;
      existing.wrong_date = today;
      existing.next_review = addDays(today, INTERVALS[1]);
    } else {
      APP_DATA.wrong_book.push({
        id: q.id,
        wrong_date: today,
        stage: 1,
        next_review: addDays(today, INTERVALS[1])
      });
    }
    if (APP_DATA.wrong_history.indexOf(q.id) === -1) {
      APP_DATA.wrong_history.push(q.id);
    }
  }

  if (!q._is_review) {
    APP_DATA.day_index = Math.max(APP_DATA.day_index, q.id);
  }

  if (!APP_DATA.completed_days[today]) {
    APP_DATA.completed_days[today] = { correct: 0, wrong: 0, total: 0 };
  }
  APP_DATA.completed_days[today].correct += isCorrect ? 1 : 0;
  APP_DATA.completed_days[today].wrong += isCorrect ? 0 : 1;
  APP_DATA.completed_days[today].total += 1;

  APP_DATA.session = {
    date: today,
    batch: currentBatch,
    index: currentIndex,
    stats: { correct: batchStats.correct, wrong: batchStats.wrong },
    answered: answeredStates.slice()
  };

  saveData(APP_DATA);
}

// ==================== 导航 ====================
function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    if (APP_DATA.session) APP_DATA.session.index = currentIndex;
    saveData(APP_DATA);
    renderQuestion();
  }
}

function nextQuestion() {
  currentIndex++;
  if (APP_DATA.session) APP_DATA.session.index = currentIndex;
  if (currentIndex >= currentBatch.length) {
    APP_DATA.session = null;
    saveData(APP_DATA);
    showCompletionPage();
    return;
  }
  saveData(APP_DATA);
  renderQuestion();
}

// ==================== 完成页面 ====================
function showCompletionPage() {
  var today = todayStr();
  var todayStats = APP_DATA.completed_days[today] || { correct: 0, wrong: 0, total: 0 };
  var accuracy = todayStats.total > 0 ? Math.round(todayStats.correct / todayStats.total * 100) : 0;
  var totalAnswered = 0;
  var totalCorrect = 0;
  var days = APP_DATA.completed_days;
  for (var d in days) {
    totalAnswered += days[d].total || 0;
    totalCorrect += days[d].correct || 0;
  }
  var totalAccuracy = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
  var remainingNew = ALL_QUESTIONS.length - APP_DATA.day_index;

  var wrongRows = '';
  for (var i = 0; i < currentBatch.length; i++) {
    var q = currentBatch[i];
    var state = answeredStates[i];
    if (state && !state.isCorrect) {
      var userAns = state.choice || '?';
      var userOptText = q.options[userAns.charCodeAt(0) - 65] ? q.options[userAns.charCodeAt(0) - 65].substring(3) : '';
      var correctOptText = q.options[q.answer.charCodeAt(0) - 65] ? q.options[q.answer.charCodeAt(0) - 65].substring(3) : '';
      var nextReview = APP_DATA.wrong_book.find(function(w) { return w.id === q.id; });
      var reviewDate = nextReview ? nextReview.next_review : '-';
      wrongRows += '<tr><td>' + (wrongRows.split('</tr>').length) + '</td><td style="text-align:left">' + escapeHtml(q.question.substring(0, 40)) + '...</td><td>' + userAns + '. ' + escapeHtml(userOptText.substring(0, 10)) + '</td><td>' + q.answer + '. ' + escapeHtml(correctOptText.substring(0, 10)) + '</td><td>' + reviewDate + '</td></tr>';
    }
  }

  var tomorrowReviews = APP_DATA.wrong_book.filter(function(w) { return w.next_review === addDays(today, 1); });

  document.getElementById('app').innerHTML =
    renderTopBar(false) +
    '<div class="card" style="padding:2rem;">' +
      '<div class="page-title">今日答题完成</div>' +
      '<div class="page-subtitle">' + today + '</div>' +
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-num">' + todayStats.correct + '</div><div class="stat-label green">✅ 正确</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + todayStats.wrong + '</div><div class="stat-label red">❌ 错误</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + accuracy + '%</div><div class="stat-label blue">正确率</div></div>' +
      '</div>' +
      (wrongRows ? '<div class="section-title">📋 错题回顾</div><table class="wrong-table"><tr><th>#</th><th>题目</th><th>你的答案</th><th>正确答案</th><th>下次复习</th></tr>' + wrongRows + '</table>' : '') +
      (tomorrowReviews.length > 0 ? '<div class="review-alert">📅 明天有 <strong>' + tomorrowReviews.length + '</strong> 道错题需要复习，记得来打卡</div>' : '') +
      '<div class="cumulative">📊 累计答题：' + totalAnswered + ' 题 · 总正确率：' + totalAccuracy + '% · 待复习错题：' + APP_DATA.wrong_book.length + ' 题 · 剩余新题：' + remainingNew + '</div>' +
      '<button class="btn-continue" onclick="continuePractice()">继续刷题（新题 ' + Math.min(30, remainingNew) + ' 题）</button>' +
      (remainingNew === 0 && APP_DATA.wrong_history.length > 0 ? '<button class="btn-continue" style="background:#b45309;margin-top:0.75rem" onclick="reviewWrongHistory()">🔁 错题专项复习（' + APP_DATA.wrong_history.length + ' 题）</button>' : '') +
      '<div class="tools-row">' +
        '<button class="btn-tool" onclick="exportData()">💾 导出进度</button>' +
        '<button class="btn-tool" onclick="document.getElementById(\'import-file\').click()">📥 导入进度</button>' +
        '<input type="file" id="import-file" accept=".json" onchange="importData(event)">' +
      '</div>' +
    '</div>';
}

// ==================== 继续刷题 ====================
function continuePractice() {
  var selected = [];
  var ptr = APP_DATA.day_index;
  while (selected.length < 30 && ptr < ALL_QUESTIONS.length) {
    var q = ALL_QUESTIONS[ptr];
    var copy = {};
    for (var k in q) copy[k] = q[k];
    copy._is_review = false;
    selected.push(copy);
    ptr++;
  }

  if (selected.length === 0) {
    if (APP_DATA.wrong_history.length > 0) {
      if (confirm('新题已全部做完！是否进入错题专项复习？')) {
        reviewWrongHistory();
        return;
      }
    } else {
      alert('所有题目已完成，没有错题记录！');
    }
    return;
  }

  answeredStates = [];
  currentBatch = selected;
  currentIndex = 0;
  batchStats = { correct: 0, wrong: 0 };

  APP_DATA.session = null;
  saveData(APP_DATA);

  renderQuestion();
}

// ==================== 错题专项复习 ====================
function reviewWrongHistory() {
  var historyIds = APP_DATA.wrong_history;
  if (!historyIds || historyIds.length === 0) {
    alert('暂无错题记录！');
    return;
  }

  var selected = [];
  for (var i = 0; i < Math.min(historyIds.length, 30); i++) {
    var q = ALL_QUESTIONS.find(function(qq) { return qq.id === historyIds[i]; });
    if (q) {
      var copy = {};
      for (var k in q) copy[k] = q[k];
      copy._is_review = false;
      selected.push(copy);
    }
  }

  // Shuffle so order isn't always the same
  for (var s = selected.length - 1; s > 0; s--) {
    var j = Math.floor(Math.random() * (s + 1));
    var t = selected[s];
    selected[s] = selected[j];
    selected[j] = t;
  }

  answeredStates = [];
  currentBatch = selected;
  currentIndex = 0;
  batchStats = { correct: 0, wrong: 0 };

  APP_DATA.session = null;
  saveData(APP_DATA);

  renderQuestion();
}

// ==================== 中断恢复 ====================
function resumeSession() {
  var s = APP_DATA.session;
  currentBatch = s.batch;
  currentIndex = s.index;
  batchStats = s.stats;
  answeredStates = s.answered || [];

  if (currentIndex >= currentBatch.length) {
    APP_DATA.session = null;
    saveData(APP_DATA);
    showCompletionPage();
    return;
  }

  renderQuestion();
}

// ==================== 进度导入导出 ====================
function exportData() {
  var data = loadData();
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '文学常识进度_' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.day_index && !data.wrong_book && !data.completed_days) {
        alert('文件格式不正确，请选择导出的进度备份文件。');
        return;
      }
      if (confirm('导入将覆盖当前进度，确定继续？')) {
        saveData(data);
        alert('进度已导入，页面将刷新。');
        location.reload();
      }
    } catch (err) {
      alert('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ==================== 顶栏 ====================
function renderTopBar(showBack) {
  var backBtn = showBack
    ? '<button class="btn-icon" onclick="backToMain()" style="margin-right:0.25rem">← 返回</button>'
    : '';
  return '<div class="topbar">' +
    '<span class="topbar-title" onclick="backToMain()">📚 文学常识</span>' +
    '<div class="topbar-actions">' +
      backBtn +
      '<button class="btn-icon' + (currentView === 'wrongbook' ? ' active' : '') + '" onclick="showWrongBookView()">❌ 错题本</button>' +
      '<button class="btn-icon' + (currentView === 'settings' ? ' active' : '') + '" onclick="showSettingsView()">⚙️ 设置</button>' +
    '</div></div>';
}

var currentView = 'quiz'; // quiz | wrongbook | settings

function backToMain() {
  currentView = 'quiz';
  if (currentBatch.length > 0 && currentIndex < currentBatch.length) {
    renderQuestion();
  } else if (APP_DATA.completed_days[todayStr()]) {
    showCompletionPage();
  } else {
    startNewBatch();
  }
}

// ==================== 错题本页面 ====================
function showWrongBookView() {
  currentView = 'wrongbook';
  var topbar = renderTopBar(false);
  var wrongIds = APP_DATA.wrong_book.map(function(w) { return w.id; });

  if (wrongIds.length === 0) {
    document.getElementById('app').innerHTML = topbar + '<div class="wrongbook-empty">🎉 暂无错题！</div>';
    return;
  }

  var html = topbar + '<div class="page-title" style="font-size:1.4rem">错题本</div>' +
    '<div class="page-subtitle">共 ' + wrongIds.length + ' 道待复习错题</div>';

  for (var i = 0; i < wrongIds.length; i++) {
    var q = ALL_QUESTIONS.find(function(qq) { return qq.id === wrongIds[i]; });
    if (!q) continue;
    var entry = APP_DATA.wrong_book.find(function(w) { return w.id === q.id; });
    var stageLabel = ['', '🔴 第1次', '🟡 第2次', '🟢 第3次'][entry ? entry.stage : 1];
    var nextReview = entry ? entry.next_review : '';
    html += '<div class="wrongbook-item">' +
      '<div class="wrongbook-q">' + escapeHtml(q.question) + '</div>' +
      '<div class="wrongbook-meta">' +
        '<span class="correct">✅ 正确答案：' + q.answer + '. ' + escapeHtml((q.options[q.answer.charCodeAt(0)-65] || '').substring(3)) + '</span><br>' +
        '<span>' + escapeHtml(q.explanation || '') + '</span><br>' +
        '<span style="font-size:0.8rem;color:#64748b">' + stageLabel + ' · 下次复习：' + nextReview + '</span>' +
      '</div></div>';
  }

  document.getElementById('app').innerHTML = html;
}

// ==================== 设置页面 ====================
function showSettingsView() {
  currentView = 'settings';
  var topbar = renderTopBar(false);
  var total = Object.keys(APP_DATA.completed_days).length;

  document.getElementById('app').innerHTML = topbar +
    '<div class="page-title" style="font-size:1.4rem">⚙️ 设置</div>' +
    '<div class="page-subtitle">累计 ' + total + ' 天有答题记录</div>' +
    '<div class="card">' +
      '<div class="setting-group">' +
        '<h3>📤 数据导出</h3>' +
        '<p class="hint-text" style="margin-bottom:0.5rem">备份答题进度到文件</p>' +
        '<button class="btn-block primary" onclick="exportData()">导出进度 (.json)</button>' +
      '</div>' +
      '<div class="setting-group">' +
        '<h3>📥 数据导入</h3>' +
        '<p class="hint-text" style="margin-bottom:0.5rem">从备份文件恢复进度</p>' +
        '<input type="file" id="import-file" onchange="importData(event)" accept=".json">' +
        '<button class="btn-block primary" onclick="document.getElementById(\'import-file\').click()">导入进度</button>' +
      '</div>' +
      '<div class="setting-group">' +
        '<h3>🗑️ 清除数据</h3>' +
        '<p class="hint-text" style="margin-bottom:0.5rem">重置所有答题进度和错题记录</p>' +
        '<button class="btn-block danger" onclick="clearAllData()">清除全部数据</button>' +
      '</div>' +
    '</div>';
}

function clearAllData() {
  if (confirm('确定要清除全部答题进度吗？\n\n这将删除：\n- 所有答题记录\n- 错题本\n- 每日统计\n\n此操作不可恢复！')) {
    localStorage.removeItem('lit_quiz');
    APP_DATA = loadData();
    ALL_QUESTIONS = [];
    answeredStates = [];
    currentBatch = [];
    currentIndex = 0;
    batchStats = { correct: 0, wrong: 0 };
    currentView = 'quiz';
    init();
  }
}

// ==================== 启动 ====================
window.onerror = function(msg, url, line) {
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div class="error">脚本错误：' + msg + '<br><small>行 ' + line + '</small><br><small>请反馈此信息。</small></div>';
  }
  return false;
};

init();
</script>
